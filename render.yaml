services:
  - type: web
    name: telegram-font-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python webhook_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: FONT_FILE_NAME
        value: font.ttf
      - key: WEBHOOK_URL
        sync: false